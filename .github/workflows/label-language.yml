name: Label by language

on:
  issues:
    types: [opened]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            const match = body.match(/### Language\s*\n+([^\n]+)/);
            if (!match) return;

            const langMap = {
              'Arabic (ar)':              'lang: Arabic',
              'German (de)':              'lang: German',
              'Spanish (es)':             'lang: Spanish',
              'French (fr)':              'lang: French',
              'Hindi (hi)':               'lang: Hindi',
              'Italian (it)':             'lang: Italian',
              'Japanese (ja)':            'lang: Japanese',
              'Korean (ko)':              'lang: Korean',
              'Portuguese (pt)':          'lang: Portuguese',
              'Russian (ru)':             'lang: Russian',
              'Chinese Simplified (zh_Hans)': 'lang: Chinese Simplified',
            };

            const label = langMap[match[1].trim()];
            if (label) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: [label],
              });
            }
