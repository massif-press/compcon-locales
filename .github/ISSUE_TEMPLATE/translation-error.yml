name: Translation Error
description: Report an incorrect, missing, or broken translation
labels: ['translation-error']
body:
  - type: dropdown
    id: language
    attributes:
      label: Language
      description: Which language has the issue?
      options:
        - العربية - Arabic (ar)
        - Deutsch - German (de)
        - Español - Spanish (es)
        - Français - French (fr)
        - हिन्दी - Hindi (hi)
        - Italiano - Italian (it)
        - 日本語 - Japanese (ja)
        - 한국어 - Korean (ko)
        - Português - Portuguese (pt)
        - Русский - Russian (ru)
        - 中文 - Chinese Simplified (zh_Hans)
    validations:
      required: true

  - type: input
    id: string-key
    attributes:
      label: String key or location
      description: The Weblate key or a short description of where the string appears in the app
      placeholder: 'e.g. actions.boost or the Boost action description'
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: Current translation
      description: Paste the current (incorrect) text
    validations:
      required: true

  - type: textarea
    id: suggested
    attributes:
      label: Suggested correction
      description: What it should say instead
    validations:
      required: true

  - type: input
    id: weblate-link
    attributes:
      label: Weblate link
      description: Direct link to the string in Weblate (optional)
      placeholder: 'https://hosted.weblate.org/...'

  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Screenshots, game rule references, glossary concerns, etc.
