# Weblate component configuration for compcon-locales

project:
  name: CompCon
  slug: compcon
  push_branch: weblate
  source_language: en

defaults:
  file_format: json
  base_is_readonly: true
  placeholder_regex: '\{[A-Za-z0-9_]+\}|@:[\w.]+'
  plural_style: pipe
  checks:
    - placeholders
    - same
    - punctuation_spacing

components:
  - name: UI
    slug: ui
    filemask: ui/*.json
    template: ui/en.json
    new_base: ui/en.json
