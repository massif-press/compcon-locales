# Weblate component configuration for compcon-locales

project:
  name: CompCon
  slug: compcon
  push_branch: weblate
  source_language: en

defaults:
  file_format: json
  base_is_readonly: true
  placeholder_regex: '\{[A-Za-z0-9_]+\}|@:[\w.]+'
  plural_style: pipe
  checks:
    - placeholders
    - same
    - punctuation_spacing

components:
  - name: UI
    slug: ui
    filemask: ui/*.json
    template: ui/en.json
    new_base: ui/en.json

  # English base generated from @massif/lancer-data
  - name: CRB Compendium
    slug: lancer-data
    filemask: content/lancer-data/*.json
    template: content/lancer-data/en.json
    new_base: content/lancer-data/en.json

  # English base generated from the in-app SRD reference (src/assets/srd)
  - name: CRB Reference
    slug: lancer-srd
    filemask: content/lancer-srd/*.json
    template: content/lancer-srd/en.json
    new_base: content/lancer-srd/en.json
